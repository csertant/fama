name: fama
description: "fáma for all platforms in flutter"

publish_to: "none"

version: 1.0.0+3

environment:
  sdk: ^3.10.0

dependencies:
  cached_network_image_ce: ^4.6.4
  connectivity_plus: ^7.1.0
  cupertino_icons: ^1.0.9
  drift: ^2.32.1
  drift_flutter: ^0.3.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_native_splash: ^2.4.7
  flutter_svg: ^2.2.4
  flutter_web_plugins:
    sdk: flutter
  go_router: ^17.2.0
  http: ^1.6.0
  intl: any
  json_annotation: ^4.11.0
  path_provider: ^2.1.5
  provider: ^6.1.5+1
  share_plus: ^12.0.2
  shared_preferences: ^2.5.5
  universal_feed: ^0.7.0
  url_launcher: ^6.3.2
  uuid: ^4.5.3

dev_dependencies:
  build_runner: ^2.13.1
  drift_dev: ^2.32.1
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  json_serializable: ^6.13.1

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
  fonts:
    - family: Times New Roman
      fonts:
        - asset: assets/fonts/TimesNewRoman.ttf
          style: normal
          weight: 400

flutter_native_splash:
  color: "#F5F5F5"
  color_dark: "#0A0A0A"
  image: "assets/icons/icon_2x.png"
  image_dark: "assets/icons/icon_white_2x.png"
  android_12:
    color: "#F5F5F5"
    color_dark: "#0A0A0A"
    image: "assets/icons/appicon_2x.png"
    image_dark: "assets/icons/appicon_white_2x.png"

flutter_launcher_icons:
  android: true
  adaptive_icon_background: "#0A0A0A"
  adaptive_icon_foreground: "assets/icons/appicon_white_2x.png"
  adaptive_icon_foreground_inset: 16
  ios: true
  remove_alpha_ios: true
  background_color_ios: "#0A0A0A"
  image_path: "assets/icons/icon_white_2x.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icons/icon_2x.png"
    background_color: "#0A0A0A"
    theme_color: "#FFF5F5F5"
  windows:
    generate: true
    image_path: "assets/icons/icon_white_2x.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/icons/icon_white_2x.png"
