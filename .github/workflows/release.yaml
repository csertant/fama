name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      lane:
        description: "Release lane"
        required: true
        type: choice
        default: beta
        options:
          - beta
          - production
      version:
        description: "Release version in CHANGELOG.md (example: 1.0.0)"
        required: true
        type: string

jobs:
  android-release:
    runs-on: ubuntu-latest
    env:
      LANE: ${{ github.event_name == 'workflow_dispatch' && inputs.lane || 'beta' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: android_release_notes
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ inputs.version }}"
          fi

          if [[ -z "$VERSION" ]]; then
            echo "Unable to determine release version"
            exit 1
          fi

          CHANGELOG_FILE="CHANGELOG.md"
          if [[ ! -f "$CHANGELOG_FILE" ]]; then
            echo "Missing CHANGELOG.md"
            exit 1
          fi

          NOTES_FILE="$RUNNER_TEMP/release-notes-android.txt"

          START_LINE="$(grep -nF "## [$VERSION]" "$CHANGELOG_FILE" | head -n 1 | cut -d: -f1 || true)"
          if [[ -z "$START_LINE" ]]; then
            echo "No changelog entry found for version $VERSION in CHANGELOG.md"
            exit 1
          fi

          tail -n "+$((START_LINE + 1))" "$CHANGELOG_FILE" \
            | awk '/^## \[/{exit} {print}' \
            | sed '/^[[:space:]]*$/d' > "$NOTES_FILE"

          if [[ ! -s "$NOTES_FILE" ]]; then
            echo "No changelog entry found for version $VERSION in CHANGELOG.md"
            exit 1
          fi

          {
            echo "RELEASE_NOTES<<EOF"
            cat "$NOTES_FILE"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Install Dart dependencies
        run: flutter pub get

      - name: Prepare Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/release-keystore.jks
          cat > android/key.properties <<EOF
          storeFile=release-keystore.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Prepare Play Store service account
        env:
          PLAY_STORE_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p android/fastlane
          cat > android/fastlane/play-store-service-account.json <<EOF
          $PLAY_STORE_SERVICE_ACCOUNT_JSON
          EOF

      - name: Build Android app bundle
        run: flutter build appbundle --release

      - name: Upload Android release with Fastlane
        env:
          AAB_PATH: ../build/app/outputs/bundle/release/app-release.aab
          RELEASE_NOTES: ${{ env.RELEASE_NOTES }}
        run: |
          cd android
          bundle exec fastlane "$LANE"

  ios-release:
    runs-on: macos-latest
    env:
      LANE: ${{ github.event_name == 'workflow_dispatch' && inputs.lane || 'beta' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check iOS release secrets
        id: check_ios_secrets
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          missing=false
          for key in APP_STORE_CONNECT_API_KEY_ID APP_STORE_CONNECT_ISSUER_ID APP_STORE_CONNECT_API_PRIVATE_KEY IOS_P12_BASE64 IOS_P12_PASSWORD IOS_PROVISIONING_PROFILE_BASE64; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key"
              missing=true
            fi
          done
          if [ "$missing" = true ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes
        if: ${{ steps.check_ios_secrets.outputs.should_run == 'true' }}
        id: ios_release_notes
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ inputs.version }}"
          fi

          if [[ -z "$VERSION" ]]; then
            echo "Unable to determine release version"
            exit 1
          fi

          CHANGELOG_FILE="CHANGELOG.md"
          if [[ ! -f "$CHANGELOG_FILE" ]]; then
            echo "Missing CHANGELOG.md"
            exit 1
          fi

          NOTES_FILE="$RUNNER_TEMP/release-notes-ios.txt"

          START_LINE="$(grep -nF "## [$VERSION]" "$CHANGELOG_FILE" | head -n 1 | cut -d: -f1 || true)"
          if [[ -z "$START_LINE" ]]; then
            echo "No changelog entry found for version $VERSION in CHANGELOG.md"
            exit 1
          fi

          tail -n "+$((START_LINE + 1))" "$CHANGELOG_FILE" \
            | awk '/^## \[/{exit} {print}' \
            | sed '/^[[:space:]]*$/d' > "$NOTES_FILE"

          if [[ ! -s "$NOTES_FILE" ]]; then
            echo "No changelog entry found for version $VERSION in CHANGELOG.md"
            exit 1
          fi

          {
            echo "RELEASE_NOTES<<EOF"
            cat "$NOTES_FILE"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Set up Flutter
        if: ${{ steps.check_ios_secrets.outputs.should_run == 'true' }}
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Set up Ruby
        if: ${{ steps.check_ios_secrets.outputs.should_run == 'true' }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Install Dart dependencies
        if: ${{ steps.check_ios_secrets.outputs.should_run == 'true' }}
        run: flutter pub get

      - name: Install CocoaPods
        if: ${{ steps.check_ios_secrets.outputs.should_run == 'true' }}
        run: |
          cd ios
          pod install

      - name: Install signing certificate and provisioning profile
        if: ${{ steps.check_ios_secrets.outputs.should_run == 'true' }}
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="temporary-password"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

          echo "$IOS_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -P "$IOS_P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/app.mobileprovision

      - name: Build iOS archive
        if: ${{ steps.check_ios_secrets.outputs.should_run == 'true' }}
        run: flutter build ipa --release

      - name: Upload iOS release with Fastlane
        if: ${{ steps.check_ios_secrets.outputs.should_run == 'true' }}
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
          IPA_PATH: ../build/ios/ipa/*.ipa
          RELEASE_NOTES: ${{ env.RELEASE_NOTES }}
        run: |
          cd ios
          bundle exec fastlane "$LANE"
