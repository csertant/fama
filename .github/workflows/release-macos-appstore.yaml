name: release-macos-appstore

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      environment_name:
        description: "GitHub Environment that stores release secrets"
        required: false
        default: release
        type: string

jobs:
  macos-appstore-release:
    runs-on: macos-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment_name || 'release' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check macOS release secrets
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
          MACOS_P12_BASE64: ${{ secrets.MACOS_P12_BASE64 }}
          MACOS_P12_PASSWORD: ${{ secrets.MACOS_P12_PASSWORD }}
          MACOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.MACOS_PROVISIONING_PROFILE_BASE64 }}
          MACOS_EXPORT_OPTIONS_PLIST_BASE64: ${{ secrets.MACOS_EXPORT_OPTIONS_PLIST_BASE64 }}
        run: |
          set -euo pipefail
          for key in APP_STORE_CONNECT_API_KEY_ID APP_STORE_CONNECT_ISSUER_ID APP_STORE_CONNECT_API_PRIVATE_KEY MACOS_P12_BASE64 MACOS_P12_PASSWORD MACOS_PROVISIONING_PROFILE_BASE64 MACOS_EXPORT_OPTIONS_PLIST_BASE64; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key"
              exit 1
            fi
          done

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Install Dart dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd macos
          pod install

      - name: Install signing certificate and provisioning profile
        env:
          MACOS_P12_BASE64: ${{ secrets.MACOS_P12_BASE64 }}
          MACOS_P12_PASSWORD: ${{ secrets.MACOS_P12_PASSWORD }}
          MACOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.MACOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="temporary-password"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

          echo "$MACOS_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/macos-cert.p12"
          security import "$RUNNER_TEMP/macos-cert.p12" -P "$MACOS_P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$MACOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/macos.provisionprofile

      - name: Build and export macOS App Store package
        env:
          MACOS_EXPORT_OPTIONS_PLIST_BASE64: ${{ secrets.MACOS_EXPORT_OPTIONS_PLIST_BASE64 }}
        run: |
          set -euo pipefail
          flutter build macos --release

          ARCHIVE_PATH="$GITHUB_WORKSPACE/build/macos/archive/Runner.xcarchive"
          EXPORT_PATH="$GITHUB_WORKSPACE/build/macos/export"
          EXPORT_PLIST_PATH="$RUNNER_TEMP/ExportOptions.plist"

          echo "$MACOS_EXPORT_OPTIONS_PLIST_BASE64" | base64 --decode > "$EXPORT_PLIST_PATH"

          xcodebuild -workspace macos/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            archive

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$EXPORT_PLIST_PATH"

      - name: Upload macOS App Store release with Fastlane
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
          MACOS_PKG_PATH: ../build/macos/export/*.pkg
        run: |
          cd macos
          bundle exec fastlane app_store
