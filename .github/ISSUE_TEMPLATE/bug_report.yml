name: Bug report
description: Report a reproducible problem to help us improve fáma.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this issue.
        Please provide as much detail as possible so we can reproduce and fix it quickly.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: Short description of the bug.
      placeholder: App crashes when opening saved articles.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List exact steps so we can reproduce the issue.
      placeholder: |
        1. Open app
        2. Go to Saved
        3. Tap an article
        4. Observe crash
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen instead?
      placeholder: Article should open in reader without crashing.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened?
      placeholder: App closes immediately after tapping the article.
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Where did you observe this issue?
      multiple: true
      options:
        - Android
        - iOS
        - macOS
        - Windows
        - Linux
        - Web
    validations:
      required: true

  - type: input
    id: app_version
    attributes:
      label: App version
      description: Version from release/build details.
      placeholder: v1.2.3

  - type: input
    id: flutter_version
    attributes:
      label: Flutter version
      description: Output of flutter --version.
      placeholder: Flutter 3.x.x

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste stack traces or attach screenshots if available.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else that might help.

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I can reliably reproduce this issue.
          required: false
